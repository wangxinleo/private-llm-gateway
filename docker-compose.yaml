# ========================================
# Docker Compose Configuration
# ========================================
# Uses ONLY bind mounts (no named volumes)

services:
  privacy-proxy:
    build:
      context: .
    image: ghcr.io/wangxinleo/private-llm-gateway:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      UPSTREAM_URL: http://localhost:8787
      DB_PATH: /data/audit.sqlite
    ports:
      - "3000:3000"
    volumes:
      # Bind mount for persistent data (no named volumes per user requirement)
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
